<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WATCh Paediatric Emergency Calculator</title>
<style>
body { font-family: Arial; background:#f4f6f8; margin:0; padding:20px; }
.container { max-width:1000px; margin:auto; }
h1 { text-align:center; }
.card { background:white; padding:15px; border-radius:10px; margin-top:15px; }
input, button { width:100%; padding:12px; margin-top:10px; font-size:16px; }
.section { margin-top:20px; }
.section h3 { background:#7a007a; color:white; padding:8px; border-radius:6px; }
.row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #eee; }
.warning { color:red; font-weight:bold; }
.small { font-size:12px; color:#555; }
button { background:#7a007a; color:white; border:none; border-radius:8px; }
</style>
</head>
<body>
<div class="container">
<h1>🧒 WATCh Full Clinical Calculator</h1>

<div class="card">
<label>Date of Birth</label>
<input type="date" id="dob">

<label>Weight (kg)</label>
<input type="number" id="weight" placeholder="Enter weight">

<button onclick="generateSheet()">Generate Full Sheet</button>
<div id="ageDisplay" class="small"></div>
<div id="output"></div>
</div>

</div>

<script>

function calculateAge() {
  const dob = document.getElementById("dob").value;
  if (!dob) return "";
  const birth = new Date(dob);
  const today = new Date();
  let years = today.getFullYear() - birth.getFullYear();
  let months = today.getMonth() - birth.getMonth();
  if (months < 0) {
    years--;
    months += 12;
  }
  return `${years}y ${months}m`;
}

const sections = {

"Emergency Drugs": {
"Adrenaline": { dose:10, unit:"mcg" },
"Atropine": { dose:20, unit:"mcg", min:100, max:600 },
"Amiodarone": { dose:5, unit:"mg" },
"Adenosine (1st)": { dose:100, unit:"mcg" },
"Adenosine (2nd)": { dose:200, unit:"mcg" }
},

"Intubation Drugs": {
"Suxamethonium": { dose:2, unit:"mg" },
"Fentanyl": { dose:2, unit:"mcg" },
"Ketamine": { dose:2, unit:"mg" },
"Rocuronium": { dose:1, unit:"mg" }
},

"Resus": {
"Fluid Bolus": { dose:10, unit:"ml/kg" },
"Defibrillation": { dose:4, unit:"J/kg" }
},

"Infusions": {
"Adrenaline Infusion": { dose:0.1, unit:"mcg/kg/min" },
"Noradrenaline": { dose:0.1, unit:"mcg/kg/min" }
}

};

function generateSheet() {
const weight = parseFloat(document.getElementById("weight").value);
if (!weight || weight <= 0) {
alert("Enter valid weight");
return;
}

const age = calculateAge();
if (age) {
document.getElementById("ageDisplay").innerHTML = "Age: " + age;
} else {
document.getElementById("ageDisplay").innerHTML = "";
}

let html = "";

for (let section in sections) {
html += `<div class="section"><h3>${section}</h3>`;

for (let drug in sections[section]) {
let item = sections[section][drug];
let total = weight * item.dose;

let unit = item.unit.includes("/kg") ? item.unit.replace("/kg","") : item.unit;

html += `
<div class="row">
<div><b>${drug}</b><br><span class="small">${item.dose} ${item.unit}</span></div>
<div>${total.toFixed(2)} ${unit}</div>
</div>`;
}

html += `</div>`;
}

document.getElementById("output").innerHTML = html;
}

</script>

</body>
</html>
